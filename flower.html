<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Flower Opening</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        height: 100vh;
        background: #fff5f8;
      }

      .door {
        position: absolute;
        top: 0;
        width: 50%;
        height: 100%;
        background-image: url("pic4.jpg");
        background-size: cover;
        background-position: center;
        transition: 2.5s ease-in-out;
      }

      .left {
        left: 0;
      }

      .right {
        right: 0;
      }

      .open-left {
        transform: translateX(-100%);
      }

      .open-right {
        transform: translateX(100%);
      }

      .letter {
        position: absolute;
        top: 50%;
        left: 50%;
        z-index: 900;
        transform: translate(-50%, -50%);

        /* font-size: 120px;*/
        font-size: clamp(60px, 15vw, 120px);

        opacity: 0;

        transition: all 1.5s ease;
        cursor: pointer;
      }
      .letter:hover {
        transform: translate(-50%, -50%) scale(1.15);
      }

      .show {
        opacity: 1;
      }
      #flowers {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      .flower {
        position: absolute;

        width: min(35vw, 400px);
        height: auto;
        transition:
          transform 4s ease,
          opacity 4s ease;
      }

      .teddy {
        position: absolute;
        left: 50%;
        top: 50%;
        /*width: 1000px;*/

        width: 100vw;
        max-width: 1300px;

        transform: translate(-50%, -50%);
        z-index: 1000;
        filter: drop-shadow(0 30px 50px rgba(0, 0, 0, 0.25));
        opacity: 1;
        z-index: 1000;
        transition:
          transform 6s cubic-bezier(0.16, 1, 0.3, 1),
          opacity 6s ease;
      }
      #lovePage {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;

        clip-path: inset(0 0 100% 0);
        opacity: 0.4;

        transition: clip-path 9s linear;
        z-index: 500;
      }
      @keyframes teddySlide {
        0% {
          transform: translate(-50%, -50%) scale(1);
        }

        15% {
          transform: translate(-50%, -30%) scale(1.02);
        }

        35% {
          transform: translate(-50%, 10vh) scale(1.01);
        }

        60% {
          transform: translate(-50%, 50vh) scale(1);
        }

        100% {
          transform: translate(-50%, 150vh) scale(0.98);
        }
      }
      @media (max-width: 768px) {
        .teddy {
          width: 105vw;
        }

        .flower {
          width: 38vw;
        }
      }
    </style>
  </head>

  <body>
    <div id="flowers"></div>
    <iframe src="love.html" id="lovePage"></iframe>

    <div class="letter" id="letter">💌</div>

    <script>
      const flowersContainer = document.getElementById("flowers");

      const flowerImages = [
        "image/pp1.png",
        "image/pp2.png",
        "image/pp3.png",
        "image/pp4.png",
      ];

      for (let i = 0; i < 250; i++) {
        const flower = document.createElement("img");

        flower.src =
          flowerImages[Math.floor(Math.random() * flowerImages.length)];

        flower.classList.add("flower");

        const cols = 8;

        const row = Math.floor(i / cols);
        const col = i % cols;

        flower.style.left = `${Math.random() * 120 - 10}%`;
        flower.style.top = `${Math.random() * 120 - 10}%`;

        flowersContainer.appendChild(flower);
      }
      setTimeout(() => {
        document.querySelectorAll(".flower").forEach((flower) => {
          const direction = Math.random() > 0.5 ? 1 : -1;

          flower.style.transform = `translateX(${direction * 1200}px)
                 rotate(${direction * 720}deg)`;

          flower.style.opacity = "0";
        });
      }, 1000);
      setTimeout(() => {
        document.querySelectorAll(".flower").forEach((flower) => {
          const direction = Math.random() > 0.5 ? 1 : -1;

          flower.style.transform = `translateX(${direction * 1200}px)
             rotate(${direction * 720}deg)`;

          flower.style.opacity = "0";
        });
      }, 1000);

      setTimeout(() => {
        document.getElementById("letter").classList.add("show");
      }, 4000);

      document.getElementById("letter").onclick = () => {
        const letter = document.getElementById("letter");

        setTimeout(() => {
          letter.style.transform = "translate(-50%, -50%) scale(2.5)";

          letter.style.transition = "0.4s";
          letter.style.opacity = "0";
          const teddy = document.createElement("img");

          teddy.src = "image/teddy.png";

          teddy.classList.add("teddy");

          document.body.appendChild(teddy);
          setTimeout(() => {
            document.body.animate(
              [
                { transform: "translateX(0px)" },
                { transform: "translateX(-8px)" },
                { transform: "translateX(8px)" },
                { transform: "translateX(0px)" },
              ],
              {
                duration: 180,
              },
            );
          }, 150);
          const lovePage = document.getElementById("lovePage");
          teddy.style.transform = "translate(-50%, -50%) scale(1.02)";
          teddy.style.animation = "teddyImpact 0.7s ease-out forwards";

          setTimeout(() => {
            teddy.style.animation = "none";

            void teddy.offsetWidth;

            teddy.style.animation =
              "teddySlide 28s cubic-bezier(0.22, 1, 0.36, 1) forwards";

            let progress = 100;

            const reveal = setInterval(() => {
              progress -= 1;

              lovePage.style.clipPath = `inset(0 0 ${progress}% 0)`;

              if (progress <= 0) {
                clearInterval(reveal);

                lovePage.style.clipPath = "inset(0 0 0 0)";
                lovePage.style.opacity = "1";

                setTimeout(() => {
                  document
                    .getElementById("lovePage")
                    .contentWindow.showButton();
                }, 1000);
              }
            }, 50);
          }, 700);

          setTimeout(() => {
            teddy.style.opacity = "0";
          }, 8500);
        }, 400);
      };
    </script>
  </body>
</html>
